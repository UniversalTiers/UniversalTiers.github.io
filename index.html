<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Universal Tiers</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="https://i.imgur.com/aaOR813.png">
</head>

<body>

<header>
  <h1>Universal Tiers</h1>

</header>

<div id="search-bar">
  <input
    type="text"
    id="searchInput"
    placeholder="Search player..."
  >
</div>


<div id="leaderboard">

  <div class="player-row">
    <div class="rank">1.</div>
    <img src="https://mc-heads.net/head/Notch/40" class="avatar">
    <div class="name">PlayerOne</div>
    <div class="region NA" title="North America">NA</div>
    <div class="tiers">
      <div class="tier-badge S">S</div>
      <div class="tier-badge A">A</div>
      <div class="tier-badge B">B</div>
      <div class="tier-badge C">C</div>
    </div>
  </div>

</div>

<footer>
  <p>Not affiliated with MCTiers.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
